<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo Estrangeiro - B3</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 20px;
      border-bottom: 2px solid #2a2a4a;
      padding-bottom: 10px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #2a2a4a;
    }
    .card .label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card .value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .card .value.positive { color: #4caf50; }
    .card .value.negative { color: #f44336; }
    .chart-container {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 20px;
      border: 1px solid #2a2a4a;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls button {
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #3a3a5a;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .controls button.active {
      background: #4a4a8a;
      border-color: #6a6aaa;
    }
    .controls button:hover { background: #3a3a5a; }
    .controls label {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #aaa;
      cursor: pointer;
    }
    footer {
      text-align: center;
      color: #555;
      font-size: 0.75rem;
      margin-top: 20px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1>Fluxo Estrangeiro - B3</h1>

  <div class="cards" id="cards">
    <div class="card">
      <div class="label">Z-Score (90d)</div>
      <div class="value" id="v-zscore">--</div>
    </div>
    <div class="card">
      <div class="label">Ultimo Valor (R$ mi)</div>
      <div class="value" id="v-ultimo">--</div>
    </div>
    <div class="card">
      <div class="label">Media 90d (R$ mi)</div>
      <div class="value" id="v-media">--</div>
    </div>
    <div class="card">
      <div class="label">Acumulado Ano (R$ mi)</div>
      <div class="value" id="v-acumulado">--</div>
    </div>
  </div>

  <div class="controls">
    <button data-range="30">30d</button>
    <button data-range="90" class="active">90d</button>
    <button data-range="180">180d</button>
    <button data-range="365">1a</button>
    <button data-range="0">Tudo</button>
    <label>
      <input type="checkbox" id="toggleIbov" checked> Ibovespa
    </label>
  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

  <footer>
    Dados: dadosdemercado.com.br | Ibovespa: Yahoo Finance
  </footer>

  <script>
    let chart = null;
    let dadosCompletos = null;

    function fmt(v) {
      if (v === null || v === undefined || isNaN(v)) return '--';
      return v.toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
    }

    function atualizarCards(r) {
      const zs = document.getElementById('v-zscore');
      const ult = document.getElementById('v-ultimo');
      const med = document.getElementById('v-media');
      const acu = document.getElementById('v-acumulado');

      if (r.z_score_atual !== null && r.z_score_atual !== undefined) {
        zs.textContent = r.z_score_atual.toFixed(2);
        zs.className = 'value' + (r.z_score_atual >= 0 ? ' positive' : ' negative');
      }
      ult.textContent = fmt(r.ultimo_valor);
      ult.className = 'value' + (r.ultimo_valor >= 0 ? ' positive' : ' negative');
      med.textContent = fmt(r.media_90d);
      acu.textContent = fmt(r.acumulado_ano);
    }

    function criarGrafico(dias) {
      const mostrarIbov = document.getElementById('toggleIbov').checked;
      const labels = dias.map(d => d.data);
      const fluxo = dias.map(d => d.estrangeiro);
      const ibov = dias.map(d => d.ibov_fechamento ?? null);

      if (chart) chart.destroy();

      const corFundo = fluxo.map(v => v >= 0
        ? 'rgba(76, 175, 80, 0.7)'
        : 'rgba(244, 67, 54, 0.7)'
      );
      const corBorda = fluxo.map(v => v >= 0
        ? 'rgba(76, 175, 80, 1)'
        : 'rgba(244, 67, 54, 1)'
      );

      const datasets = [
        {
          label: 'Fluxo Estrangeiro (R$ mi)',
          data: fluxo,
          type: 'bar',
          backgroundColor: corFundo,
          borderColor: corBorda,
          borderWidth: 1,
          borderRadius: 2,
          yAxisID: 'y',
        },
      ];

      if (mostrarIbov && ibov.some(v => v !== null)) {
        datasets.push({
          label: 'Ibovespa',
          data: ibov,
          type: 'line',
          borderColor: 'rgba(255, 193, 7, 0.9)',
          backgroundColor: 'rgba(255, 193, 7, 0.08)',
          fill: true,
          tension: 0.15,
          pointRadius: 0,
          borderWidth: 2,
          yAxisID: 'y1',
        });
      }

      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 2,
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins: {
            legend: {
              labels: { color: '#e0e0e0', font: { size: 12 } },
            },
          },
          scales: {
            x: {
              ticks: {
                color: '#888',
                maxTicksLimit: 12,
                font: { size: 10 },
              },
              grid: { color: 'rgba(255,255,255,0.04)' },
            },
            y: {
              position: 'left',
              ticks: { color: '#4caf50', font: { size: 10 } },
              grid: { color: 'rgba(255,255,255,0.04)' },
              title: {
                display: true,
                text: 'Fluxo (R$ milhoes)',
                color: '#4caf50',
              },
            },
            y1: {
              position: 'right',
              ticks: { color: '#ffc107', font: { size: 10 } },
              grid: { display: false },
              title: {
                display: mostrarIbov,
                text: 'Ibovespa (pontos)',
                color: '#ffc107',
              },
            },
          },
        },
      });
    }

    function aplicarRange(dias, range) {
      if (range === 0) return dias;
      const corte = new Date();
      corte.setDate(corte.getDate() - range);
      return dias.filter(d => new Date(d.data) >= corte);
    }

    function atualizar(range) {
      if (!dadosCompletos) return;
      const filtrados = aplicarRange(dadosCompletos.dias, range);
      criarGrafico(filtrados);
    }

    document.querySelectorAll('[data-range]').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        atualizar(parseInt(this.dataset.range));
      });
    });

    document.getElementById('toggleIbov').addEventListener('change', function () {
      const active = document.querySelector('[data-range].active');
      const range = active ? parseInt(active.dataset.range) : 90;
      atualizar(range);
    });

    fetch('./data/fluxo_estrangeiro.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(dados => {
        dadosCompletos = dados;
        atualizarCards(dados.resumo);
        atualizar(90);
      })
      .catch(err => {
        document.querySelector('.chart-container').innerHTML =
          '<div class="loading">Dados ainda nao disponiveis. Execute run_all.py primeiro.</div>';
      });
  </script>
</body>
</html>
